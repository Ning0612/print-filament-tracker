<form hx-post="{{ url_for('settings.login_step1') }}"
      hx-target="#login-form-area"
      hx-swap="innerHTML"
      hx-disabled-elt="button[type=submit]"
      style="margin-top:1rem;">
  <div class="grid" style="grid-template-columns:1fr 1fr;gap:1rem;">
    <label>
      {{ t('settings.login_email') }}
      <input type="email" name="email" required placeholder="your@email.com" autocomplete="username">
    </label>
    <label>
      {{ t('settings.login_password') }}
      <input type="password" name="password" required placeholder="••••••••" autocomplete="current-password">
    </label>
  </div>
  <label style="max-width:280px;">
    {{ t('settings.login_region') }}
    <select name="region">
      <option value="global">{{ t('settings.login_region_global') }}</option>
      <option value="china">{{ t('settings.login_region_china') }}</option>
    </select>
  </label>
  <button type="submit" style="margin-top:0.5rem;">{{ t('settings.login_submit') }}</button>
</form>
