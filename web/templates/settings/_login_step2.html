{% if login_type == "verifyCode" %}
<p class="flash flash-success" style="margin-bottom:1rem;">
  {{ t('settings.login_email_code_sent') }} <strong>{{ email }}</strong>{{ t('settings.login_email_code_hint') }}
</p>
<form hx-post="{{ url_for('settings.login_step2') }}"
      hx-target="#login-form-area"
      hx-swap="innerHTML"
      hx-disabled-elt="button[type=submit]">
  <label>
    {{ t('settings.login_email_code_label') }}
    <input type="text" name="code" required placeholder="123456"
           autocomplete="one-time-code" inputmode="numeric" autofocus>
  </label>
  <div style="display:flex;gap:0.75rem;margin-top:0.5rem;">
    <button type="submit" style="width:fit-content;">{{ t('settings.login_verify_btn') }}</button>
    <button type="button" class="outline secondary"
            hx-get="{{ url_for('settings.login_form') }}"
            hx-target="#login-form-area"
            hx-swap="innerHTML">{{ t('settings.login_restart_btn') }}</button>
  </div>
</form>

{% elif login_type == "tfa" %}
<p class="flash flash-success" style="margin-bottom:1rem;">
  {{ t('settings.login_tfa_hint') }}
</p>
<form hx-post="{{ url_for('settings.login_step2') }}"
      hx-target="#login-form-area"
      hx-swap="innerHTML"
      hx-disabled-elt="button[type=submit]">
  <label>
    {{ t('settings.login_tfa_label') }}
    <input type="text" name="code" required placeholder="123456"
           autocomplete="one-time-code" inputmode="numeric"
           maxlength="6" autofocus>
  </label>
  <div style="display:flex;gap:0.75rem;margin-top:0.5rem;">
    <button type="submit" style="width:fit-content;">{{ t('settings.login_verify_btn') }}</button>
    <button type="button" class="outline secondary"
            hx-get="{{ url_for('settings.login_form') }}"
            hx-target="#login-form-area"
            hx-swap="innerHTML">{{ t('settings.login_restart_btn') }}</button>
  </div>
</form>
{% endif %}
