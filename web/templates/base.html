<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BambuPrintManager{% endblock %}</title>
  <script>(function(){try{var t=localStorage.getItem('bambu-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}}());</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="container-fluid">
    <nav>
      <ul>
        <li><strong>🐼 BambuPrintManager</strong></li>
      </ul>
      <ul>
        <li><a href="{{ url_for('dashboard.index') }}" {% if request.path == '/' %}aria-current="page"{% endif %}>儀表板</a></li>
        <li><a href="{{ url_for('spools.list_view') }}" {% if request.path.startswith('/spools') %}aria-current="page"{% endif %}>耗材管理</a></li>
        <li><a href="{{ url_for('tasks.list_view') }}" {% if request.path.startswith('/tasks') %}aria-current="page"{% endif %}>列印歷史</a></li>
        <li><a href="{{ url_for('mapping.list_view') }}" {% if request.path.startswith('/mapping') %}aria-current="page"{% endif %}>耗材對照</a></li>
        <li><a href="{{ url_for('settings.index') }}" {% if request.path.startswith('/settings') %}aria-current="page"{% endif %}>設定</a></li>
      </ul>
    </nav>
  </header>

  <div id="cover-lightbox" role="dialog" aria-modal="true" aria-label="封面圖預覽">
    <button id="cover-lightbox-close" aria-label="關閉">×</button>
    <img id="cover-lightbox-img" src="" alt="">
  </div>

  <main class="container-fluid" style="margin-top:1.5rem;">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <footer class="container-fluid" style="margin-top:3rem;padding:1rem;border-top:1px solid var(--pico-muted-border-color);color:var(--pico-muted-color);font-size:0.85rem;">
    BambuPrintManager — 本機耗材管理工具
  </footer>
<script>
(function () {
  var lb    = null;
  var lbImg = null;

  function openLightbox(src, alt) {
    lbImg.src = src;
    lbImg.alt = alt || '';
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
  }

  function initCoverThumbs(root) {
    (root || document).querySelectorAll('.cover-thumb img').forEach(function (img) {
      function done() {
        img.classList.add('img-loaded');
        var thumb = img.closest('.cover-thumb');
        if (thumb) thumb.classList.add('loaded');
        if (thumb && !thumb.dataset.lightboxBound) {
          thumb.dataset.lightbox = '1';
          thumb.dataset.lightboxBound = '1';
          thumb.addEventListener('click', function () {
            if (img.classList.contains('img-loaded')) openLightbox(img.src, img.alt);
          });
        }
      }
      function fail() { img.classList.add('img-error'); img.style.display = 'none'; }
      if (img.complete) { img.naturalWidth > 0 ? done() : fail(); }
      else {
        img.addEventListener('load',  done, { once: true });
        img.addEventListener('error', fail, { once: true });
      }
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    lb    = document.getElementById('cover-lightbox');
    lbImg = document.getElementById('cover-lightbox-img');

    document.getElementById('cover-lightbox-close').addEventListener('click', closeLightbox);
    lb.addEventListener('click', function (e) {
      if (e.target === lb) closeLightbox();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && lb.classList.contains('open')) closeLightbox();
    });

    initCoverThumbs();
  });

  document.addEventListener('htmx:afterSwap', function (e) { initCoverThumbs(e.detail.target); });
}());
</script>
</body>
</html>
