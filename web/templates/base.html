<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BambuPrintManager{% endblock %}</title>
  <script>(function(){try{var t=localStorage.getItem('bambu-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}}());</script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="container-fluid">
    <nav>
      <ul>
        <li><strong>🐼 BambuPrintManager</strong></li>
      </ul>
      <ul>
        <li><a href="{{ url_for('dashboard.index') }}" {% if request.path == '/' %}aria-current="page"{% endif %}>儀表板</a></li>
        <li><a href="{{ url_for('spools.list_view') }}" {% if request.path.startswith('/spools') %}aria-current="page"{% endif %}>耗材管理</a></li>
        <li><a href="{{ url_for('tasks.list_view') }}" {% if request.path.startswith('/tasks') %}aria-current="page"{% endif %}>列印歷史</a></li>
        <li><a href="{{ url_for('mapping.list_view') }}" {% if request.path.startswith('/mapping') %}aria-current="page"{% endif %}>Mapping</a></li>
      </ul>
      <ul>
        <li>
          <button id="theme-toggle" type="button" class="outline"
                  style="padding:0.2rem 0.55rem;font-size:1.05rem;line-height:1;margin-bottom:0;"
                  title="切換深色模式"></button>
        </li>
      </ul>
    </nav>
  </header>

  <main class="container-fluid" style="margin-top:1.5rem;">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <footer class="container-fluid" style="margin-top:3rem;padding:1rem;border-top:1px solid var(--pico-muted-border-color);color:var(--pico-muted-color);font-size:0.85rem;">
    BambuPrintManager — 本機耗材管理工具
  </footer>
<script>
(function () {
  function initCoverThumbs(root) {
    (root || document).querySelectorAll('.cover-thumb img').forEach(function (img) {
      function done() { img.classList.add('img-loaded'); }
      function fail() { img.classList.add('img-error'); img.style.display = 'none'; }
      if (img.complete) { img.naturalWidth > 0 ? done() : fail(); }
      else {
        img.addEventListener('load',  done, { once: true });
        img.addEventListener('error', fail, { once: true });
      }
    });
  }
  document.addEventListener('DOMContentLoaded', function () { initCoverThumbs(); });
  document.addEventListener('htmx:afterSwap', function (e) { initCoverThumbs(e.detail.target); });
}());
</script>
<script>
(function () {
  var KEY = 'bambu-theme';

  function syncBtn(theme) {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    var isDark = theme === 'dark';
    btn.textContent = isDark ? '☀' : '☾';
    btn.title = isDark ? '切換淺色模式' : '切換深色模式';
  }

  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    try { localStorage.setItem(KEY, t); } catch (e) {}
    syncBtn(t);
  }

  document.getElementById('theme-toggle').addEventListener('click', function () {
    var cur = document.documentElement.getAttribute('data-theme') || 'light';
    setTheme(cur === 'light' ? 'dark' : 'light');
  });

  syncBtn(document.documentElement.getAttribute('data-theme') || 'light');
}());
</script>
</body>
</html>
