<tr id="ptf-row-{{ ptf_id }}" class="mapped-row">
  <td colspan="7" style="color:var(--pico-muted-color);">{{ t('mapping.mapped_status') }}</td>
  <td>
    {% if spool %}
    <span class="color-swatch" style="--swatch-color:{{ spool.color_hex or '#cccccc' }};"></span>
    [{{ spool.id }}] {{ spool.color_name or spool.color_hex or '-' }} {{ spool.material or '' }}
    {% endif %}
  </td>
  <td><span style="color:green;">✓</span></td>
</tr>
