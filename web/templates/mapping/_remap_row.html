<tr id="mapped-row-{{ r.id }}">
  <td colspan="8">
    <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
      <span style="color:var(--pico-muted-color);font-size:0.85rem;">{{ t('mapping.remap_label') }}</span>
      <select name="spool_id" id="remap-spool-{{ r.id }}" style="min-width:200px;margin:0;">
        <option value="">{{ t('mapping.select_new_spool') }}</option>
        {% for s in spools %}
        <option value="{{ s.id }}" {% if s.id == r.filament_spool_id %}selected{% endif %}>
          [{{ s.id }}] {{ s.color_name or s.color_hex or '-' }} {{ s.material or '' }} ({{ t('mapping.remaining', n='%.0f'|format(s.remaining_weight_g)) }})
        </option>
        {% endfor %}
      </select>
    </div>
  </td>
  <td style="white-space:nowrap;">
    <div style="display:flex;gap:0.25rem;">
      <button hx-post="{{ url_for('mapping.remap_view', ptf_id=r.id) }}"
              hx-include="#remap-spool-{{ r.id }}"
              hx-target="#mapped-row-{{ r.id }}"
              hx-swap="outerHTML"
              style="padding:0.3rem 0.75rem;font-size:0.875rem;margin:0;line-height:1.4;">{{ t('mapping.remap_confirm_btn') }}</button>
      <button class="outline"
              hx-get="{{ url_for('mapping.mapped_row_view', ptf_id=r.id) }}"
              hx-target="#mapped-row-{{ r.id }}"
              hx-swap="outerHTML"
              style="padding:0.3rem 0.75rem;font-size:0.875rem;margin:0;line-height:1.4;">{{ t('mapping.cancel_btn') }}</button>
    </div>
  </td>
</tr>
