name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-smoke:
    name: Python smoke checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall src web scripts tray_main.py

      - name: Validate translation JSON
        run: |
          python -c "import json, pathlib; [json.load(open(path, encoding='utf-8')) for path in pathlib.Path('web/translations').glob('*.json')]; print('translation JSON OK')"

      - name: Flask app smoke test
        env:
          SECRET_KEY: ci-smoke-secret
        run: |
          python -c "from pathlib import Path; from web.app import create_app; app = create_app(Path('data/ci-smoke.db')); client = app.test_client(); response = client.get('/'); print('GET / ->', response.status_code); assert response.status_code < 500"
